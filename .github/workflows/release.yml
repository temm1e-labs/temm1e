name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxkbcommon-dev libpipewire-0.3-dev libspa-0.2-dev libclang-dev libegl1-mesa-dev libgbm-dev libdrm-dev libxdo-dev

      - name: Cargo check
        run: cargo check

      - name: Cargo test
        run: cargo test

      - name: Cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Cargo fmt check
        run: cargo fmt --check

  release:
    name: Release — ${{ matrix.target }}
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: temm1e-x86_64-linux
          # aarch64-linux-musl disabled: cross-compiling vendored OpenSSL
          # for musl+aarch64 has unresolved glibc symbol issues. Use Docker
          # multi-arch builds or `cross` tool for this target in the future.
          # - target: aarch64-unknown-linux-musl
          #   os: ubuntu-latest
          #   artifact: temm1e-aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: temm1e-x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: temm1e-aarch64-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools perl make
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu perl make
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV

      - name: Build release binary
        run: |
          if [[ "${{ matrix.target }}" == *"linux"* ]]; then
            # Linux musl: exclude desktop-control (xcap needs wayland/xcb system libs
            # which can't statically link with musl). Linux users who want desktop
            # control should build from source or use Docker.
            cargo build --release --target ${{ matrix.target }} \
              --features openssl-vendored \
              --no-default-features \
              --features telegram,discord,browser,mcp,codex-oauth,openssl-vendored
          else
            # macOS: all default features including desktop-control
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/temm1e dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  publish:
    name: Publish GitHub Release
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum temm1e-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/temm1e-*
            dist/checksums-sha256.txt
          generate_release_notes: true
