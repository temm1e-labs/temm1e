name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -----------------------------------------------
  # Job 1: Code quality (fmt + clippy)
  # -----------------------------------------------
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxkbcommon-dev libpipewire-0.3-dev libspa-0.2-dev libclang-dev libegl1-mesa-dev libgbm-dev libdrm-dev libxdo-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # -----------------------------------------------
  # Job 2: Tests
  # -----------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxkbcommon-dev libpipewire-0.3-dev libspa-0.2-dev libclang-dev libegl1-mesa-dev libgbm-dev libdrm-dev libxdo-dev

      - name: Run tests
        run: cargo test --workspace

  # -----------------------------------------------
  # Job 3: Build musl release binary
  # -----------------------------------------------
  build:
    name: Build (musl release)
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          # aarch64-linux-musl disabled: cross-compiling vendored OpenSSL
          # + desktop-control system libs for musl+aarch64 is unsupported.
          # - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }} --bin temm1e \
            --no-default-features \
            --features telegram,discord,browser,mcp,codex-oauth,openssl-vendored

      - name: Check binary size (<30 MB)
        run: |
          BINARY="target/${{ matrix.target }}/release/temm1e"
          SIZE=$(stat -c%s "$BINARY")
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Binary size: ${SIZE_MB} MB ($SIZE bytes)"
          if [ "$SIZE" -gt 31457280 ]; then
            echo "::error::Binary size ${SIZE_MB} MB exceeds 30 MB limit"
            exit 1
          fi
          echo "Binary size OK: ${SIZE_MB} MB"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: temm1e-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/temm1e
          retention-days: 7

  # -----------------------------------------------
  # Job 4: Docker image build
  # -----------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: temm1e:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check image size (<50 MB)
        run: |
          docker buildx build --load -t temm1e:size-check .
          SIZE=$(docker image inspect temm1e:size-check --format='{{.Size}}')
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Image size: ${SIZE_MB} MB"
          if [ "$SIZE" -gt 52428800 ]; then
            echo "::warning::Docker image size ${SIZE_MB} MB exceeds 50 MB target"
          fi

  # -----------------------------------------------
  # Job 5: Security audit
  # -----------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - uses: Swatinem/rust-cache@v2

      - name: Run cargo audit (advisory, non-blocking)
        run: cargo audit || echo "::warning::cargo audit found advisories (see above). These are in upstream transitive dependencies — review and update when patches are available."
